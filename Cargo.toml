[workspace]
resolver = "2"
members = [
    "crates/policy-engine",
    "crates/policy_engine_wasm",
    "crates/adapters-bundle",
    "crates/integration-tests",
    "crates/adapters/abi-resolver",
    "crates/adapters/call-adapter",
    "crates/adapters/sign-resolver",
    "crates/adapters/request-router",
    "crates/web-server",
    "crates/adapters/mappers",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

# Pinned versions every crate in this workspace agrees on.
[workspace.dependencies]
alloy-primitives = { version = "0.8", features = ["serde"] }
alloy-sol-types = "0.8"
alloy-dyn-abi = "0.8"
anyhow = "1"
cedar-policy = "4"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

# Internal crates referenced by path.
policy-engine = { path = "crates/policy-engine", version = "0.1.0" }
policy-engine-adapters-bundle = { path = "crates/adapters-bundle", version = "0.1.0" }
abi-resolver = { path = "crates/adapters/abi-resolver", version = "0.1.0" }
call-adapter = { path = "crates/adapters/call-adapter", version = "0.1.0" }
sign-resolver = { path = "crates/adapters/sign-resolver", version = "0.1.0" }
mappers = { path = "crates/adapters/mappers", version = "0.1.0" }

# WASM bridge deps
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"
wasm-bindgen-test = "0.3"
getrandom = { version = "0.2", features = ["js"] }
