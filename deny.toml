[advisories]
version = 2
yanked = "deny"
unmaintained = "all"
unused-ignored-advisory = "allow"
ignore = [
    { id = "RUSTSEC-2024-0388", reason = "Transitive through alloy-primitives in cargo-audit's lockfile scan; revisit when upgrading Alloy." },
    { id = "RUSTSEC-2024-0436", reason = "Transitive through alloy-primitives/alloy-sol-types; revisit when upgrading Alloy." },
    { id = "RUSTSEC-2025-0048", reason = "tsify-next unmaintained; no safe upgrade path available. Tracked separately." },
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 unmaintained; transitive through alloy-sol-macro. Not a vuln; revisit when upgrading Alloy." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    # CDLA-Permissive-2.0 is a permissive, OSI-style license (no copyleft).
    # Pulled in by `webpki-roots` via `reqwest` → `rustls` for the Etherscan
    # HTTP fallback in `adapter-debug-dashboard`.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
skip = [
    { crate = "hashbrown@0.15.5", reason = "Transitive split between alloy-primitives and indexmap/serde_json." },
    { crate = "unicode-width@0.1.14", reason = "Transitive split inside Cedar formatting dependencies." },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
