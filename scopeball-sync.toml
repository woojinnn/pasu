# scopeball-sync RPC config
#
# 한 chain 당 N 개 provider 를 priority 순으로 정의. `${VAR}` 패턴은
# 환경변수로 치환된다. 실제 키는 .env 파일에 두고 git 에서 제외.

# ---------- failover 정책 ----------
[failover]
strategy = "priority"          # priority | round_robin (priority 만 구현됨)
retry_attempts = 3
retry_delay_ms = 200
mark_unhealthy_after = 5
unhealthy_cooldown_sec = 60

# ---------- Ethereum mainnet ----------
[chains."eip155:1"]
multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

[[chains."eip155:1".providers]]
name = "publicnode"
kind = "public"
url = "https://ethereum-rpc.publicnode.com"
priority = 1
ws = false

# 향후 추가 예시 (지금은 주석)
# [[chains."eip155:1".providers]]
# name = "alchemy"
# kind = "alchemy"
# url = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
