# ---------- Pyth (off-chain Hermes REST API) ----------
#
# 구현체 (fetchers/oracle/pyth.rs) 는 아직 없음 — 카탈로그만 미리 잡아둠.
# feed_id 는 우리 내부 alias, price_id 는 Pyth network 의 32-byte feed id.
# 참고: https://docs.pyth.network/price-feeds/price-feeds

# [oracles.pyth]
# endpoint = "https://hermes.pyth.network"
#
# [oracles.pyth.feeds]
# "ETH/USD"      = { price_id = "0xff61491a931112ddf1bd8147cd1b641375f79f5825126d665480874634fd0ace" }
# "USDC/USD"     = { price_id = "0xeaa020c61cc479712813461ce153894a96a6c00b21ed0cfc2798d1f9a9e9c94a" }
# "BTC/USD"      = { price_id = "0xe62df6c8b4a85fe1a67db44dc12de5db330f7ac66b72dc658afedf0f4a415b43" }

# ---------- Generic REST JSON oracles ----------
#
# CoinGecko / CoinMarketCap / Pyth Hermes 같은 REST 가격 API 들.
# 새 provider 추가는 본 섹션 한 블록만 추가하면 끝 — Rust 코드 변경 0.
#
# 매칭 규칙: DataSource::OracleFeed { provider: Other(name), feed_id }
#   에서 name 이 [oracles.rest.<name>] 의 name 과 일치해야 dispatch.

[oracles.rest.coingecko]
base_url = "https://api.coingecko.com/api/v3"
timeout_sec = 10
# Pro plan 사용 시 인증 추가:
# auth = { header_name = "x-cg-pro-api-key", env_var = "COINGECKO_KEY" }

[oracles.rest.coingecko.feeds]
"USDC/USD"  = { path = "/simple/price?ids=usd-coin&vs_currencies=usd",        json_pointer = "/usd-coin/usd" }
"USDT/USD"  = { path = "/simple/price?ids=tether&vs_currencies=usd",          json_pointer = "/tether/usd" }
"ETH/USD"   = { path = "/simple/price?ids=ethereum&vs_currencies=usd",        json_pointer = "/ethereum/usd" }
"WETH/USD"  = { path = "/simple/price?ids=weth&vs_currencies=usd",            json_pointer = "/weth/usd" }
"BTC/USD"   = { path = "/simple/price?ids=bitcoin&vs_currencies=usd",         json_pointer = "/bitcoin/usd" }
"WBTC/USD"  = { path = "/simple/price?ids=wrapped-bitcoin&vs_currencies=usd", json_pointer = "/wrapped-bitcoin/usd" }
"DAI/USD"   = { path = "/simple/price?ids=dai&vs_currencies=usd",             json_pointer = "/dai/usd" }
"MATIC/USD" = { path = "/simple/price?ids=matic-network&vs_currencies=usd",   json_pointer = "/matic-network/usd" }
"ARB/USD"   = { path = "/simple/price?ids=arbitrum&vs_currencies=usd",        json_pointer = "/arbitrum/usd" }

# 예시 — CoinMarketCap (auth 필요):
# [oracles.rest.coinmarketcap]
