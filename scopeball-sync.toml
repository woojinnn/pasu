# scopeball sync config
#
# 세 섹션: [rpc] / [oracles] / [venues]
#   - rpc:     체인별 JSON-RPC provider + failover
#   - oracles: Chainlink (on-chain) / Pyth (off-chain Hermes API) feed catalog
#   - venues:  Hyperliquid 등 venue REST endpoint
#
# `${VAR}` 는 환경변수로 치환. 시크릿은 .env 와 함께 git 제외.

# ===========================================================================
#  RPC
# ===========================================================================

[rpc.failover]
strategy = "priority"          # priority | round_robin (priority 만 구현됨)
retry_attempts = 3
retry_delay_ms = 200
mark_unhealthy_after = 5
unhealthy_cooldown_sec = 60

# ---------- Ethereum mainnet ----------
[rpc.chains."eip155:1"]
multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

[[rpc.chains."eip155:1".providers]]
name = "publicnode"
kind = "public"
url = "https://ethereum-rpc.publicnode.com"
priority = 1
ws = false

# 향후 추가 예시:
# [[rpc.chains."eip155:1".providers]]
# name = "alchemy"
# kind = "alchemy"
# url = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
# priority = 2
# ws = true

# ---------- Arbitrum One ----------
[rpc.chains."eip155:42161"]
multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

[[rpc.chains."eip155:42161".providers]]
name = "publicnode-arb"
kind = "public"
url = "https://arbitrum-one-rpc.publicnode.com"
priority = 1
ws = false

# ---------- Base ----------
[rpc.chains."eip155:8453"]
multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

[[rpc.chains."eip155:8453".providers]]
name = "publicnode-base"
kind = "public"
url = "https://base-rpc.publicnode.com"
priority = 1
ws = false


