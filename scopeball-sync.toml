# ws = true

# ---------- Arbitrum One ----------
[chains."eip155:42161"]
multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

[[chains."eip155:42161".providers]]
name = "publicnode-arb"
kind = "public"
url = "https://arbitrum-one-rpc.publicnode.com"
priority = 1
ws = false

# ---------- Base ----------
[chains."eip155:8453"]
multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

[[chains."eip155:8453".providers]]
name = "publicnode-base"
kind = "public"
url = "https://base-rpc.publicnode.com"
priority = 1
ws = false

# ---------- 로컬 registry 서버 (scopeball 자체 메타데이터 공급자) ----------
# 이건 simulation-sync 가 별도로 사용하는 settings — RpcConfig 와 분리.
# 실제 사용은 RegistryFetcher 가 자체 config 읽음.
