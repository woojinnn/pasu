<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dambi 설정</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div class="ob">
  <div class="ob-panel">
    <div class="ob-top">
      <button class="ob-back" id="back" aria-label="뒤로" hidden>
        <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="ob-brand"><img class="mk" src="picture/dambi-mark-white.png" alt="" /><span class="wd">DAMBI</span></div>
      <div class="ob-dots" id="dots">
        <span class="dot on"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

    <div class="ob-eyebrow" id="eyebrow">설치 완료 · 1 / 4</div>
    <h1 id="title">지갑이 이제 보호받기 시작해요</h1>
    <p class="ob-lede" id="lede">먼저 Google 계정으로 로그인하면, 이 계정에 지갑을 묶어 정책을 동기화해요.</p>

    <div class="ob-card" id="card"><!-- step body injected --></div>

    <div class="ob-steps" id="steps">
      <div class="ob-st cur" data-step="1"><span class="num">1</span><span class="lb">Google 로그인</span></div>
      <div class="ob-st pend" data-step="2"><span class="num">2</span><span class="lb">지갑 등록</span></div>
      <div class="ob-st pend" data-step="3"><span class="num">3</span><span class="lb">베이스라인</span></div>
      <div class="ob-st pend" data-step="4"><span class="num">4</span><span class="lb">완료</span></div>
    </div>
  </div>
</div>
<script src="js/onboarding/index.js"></script>
</body>
</html>
