<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Scopeball — Hyperliquid deny demo</title>
  </head>
  <body>
    <h1>Scopeball · Hyperliquid <code>/exchange</code> deny demo</h1>
    <p>
      With the Scopeball extension loaded, a <b>short</b> perp order is blocked
      by the shipped <code>hl-no-short-perp</code> policy; a <b>long</b> order
      passes. Open the service-worker console to see
      <code>[Scopeball] venue-order-verdict … verdict: "fail"</code>.
    </p>
    <button id="short">POST short order (blocked)</button>
    <button id="long">POST long order (allowed)</button>
    <pre id="out">ready
</pre>
    <script>
      const out = document.getElementById("out");
      const log = (s) => (out.textContent += s + "\n");
      async function post(isBuy) {
        const body = {
          action: {
            type: "order",
            orders: [
              { a: 0, b: isBuy, p: "60000", s: "0.1", r: false, t: { limit: { tif: "Gtc" } } },
            ],
            grouping: "na",
          },
          nonce: Date.now(),
        };
        log(`--- POST /exchange  (${isBuy ? "LONG" : "SHORT"}) ---`);
        try {
          const r = await fetch("https://api.hyperliquid.xyz/exchange", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(body),
          });
          log(`  fetch RESOLVED status=${r.status} (not blocked)`);
        } catch (e) {
          log(`  fetch THREW → ${e?.message ?? e} (BLOCKED)`);
        }
        const v = window.__scopeball_last_verdict__;
        if (v) log(`  scopeball verdict: allowed=${v.allowed} venue=${v.venue}`);
      }
      document.getElementById("short").onclick = () => post(false);
      document.getElementById("long").onclick = () => post(true);
    </script>
  </body>
</html>
