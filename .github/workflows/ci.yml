name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --all-targets --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Doctest
        run: cargo test --doc

      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

  wasm:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - id: probe
        name: Probe wasm crate
        run: |
          if [ -f crates/policy_engine_wasm/Cargo.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.probe.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - if: steps.probe.outputs.exists == 'true'
        uses: Swatinem/rust-cache@v2

      - if: steps.probe.outputs.exists == 'true'
        name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - if: steps.probe.outputs.exists == 'true'
        name: Build wasm
        run: wasm-pack build crates/policy_engine_wasm --target web --release

      - if: steps.probe.outputs.exists == 'true'
        name: Cargo test (native) on wasm crate
        run: cargo test -p policy-engine-wasm

      - if: steps.probe.outputs.exists == 'true'
        name: wasm-bindgen-tests (headless Chrome)
        run: wasm-pack test --headless --chrome crates/policy_engine_wasm

  extension:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - id: probe
        name: Probe extension/
        run: |
          if [ -f extension/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.probe.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - if: steps.probe.outputs.exists == 'true'
        name: Enable corepack + Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.6.0 --activate

      - if: steps.probe.outputs.exists == 'true'
        working-directory: extension
        run: yarn install --immutable

      - if: steps.probe.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - if: steps.probe.outputs.exists == 'true'
        uses: Swatinem/rust-cache@v2

      - if: steps.probe.outputs.exists == 'true'
        name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - if: steps.probe.outputs.exists == 'true'
        working-directory: extension
        run: yarn typecheck

      - if: steps.probe.outputs.exists == 'true'
        working-directory: extension
        run: |
          if grep -q '"test"' package.json; then
            yarn test --run || yarn test
          fi

      - if: steps.probe.outputs.exists == 'true'
        working-directory: extension
        run: yarn build:chrome

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependency tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Dependency audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0436

      - name: Dependency policy
        run: cargo deny check
