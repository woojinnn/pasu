name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --all-targets --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Doctest
        run: cargo test --doc

      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

  wasm:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm
        run: wasm-pack build crates/policy-engine-wasm --target web --release

      - name: Cargo test (native) on wasm crate
        run: cargo test -p policy-engine-wasm

      - name: wasm-bindgen-tests (headless Chrome)
        run: wasm-pack test --headless --chrome crates/policy-engine-wasm

  extension:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack + Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.6.0 --activate

      - working-directory: extension
        run: yarn install --immutable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - working-directory: extension
        run: yarn typecheck

      - working-directory: extension
        name: Run vitest
        run: yarn test --run

      - working-directory: extension
        run: yarn build:chrome

      - working-directory: extension
        run: yarn build:firefox

      - working-directory: extension
        name: Package extension zips
        run: yarn zip

      - name: Upload Chrome dist (PR build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: scopeball-chrome-${{ github.sha }}
          path: extension/dist/chrome.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Firefox dist (PR build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: scopeball-firefox-${{ github.sha }}
          path: extension/dist/firefox.zip
          if-no-files-found: error
          retention-days: 14

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependency tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Dependency audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0436

      - name: Dependency policy
        run: cargo deny check
