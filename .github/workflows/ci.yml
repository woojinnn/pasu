name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ws"

      # The v3 decode harness (crates/integration-tests) reads `registryV2/index/`
      # at test runtime. That index is a build artifact (no longer tracked);
      # regenerate it from registryV2/{manifests,tokens} before the test steps so
      # `cargo test` can find the by-callkey / by-typed-data entries.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build registry index
        working-directory: registryV2
        run: |
          npm ci
          npm run build -- --summary-only --representative-source-refs

      - name: Format
        run: cargo fmt --all -- --check

      # `cargo clippy --all-targets --all-features` already type-checks/builds
      # everything, so a preceding `cargo check` is redundant.
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        env:
          PASU_V3_HARNESS_REPRESENTATIVE_SOURCE_REFS: '1'
        run: cargo test --all-features

      - name: Doctest
        run: cargo test --doc

      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

  wasm:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Build the wasm pkg ONCE here with the same out-dir/out-name that
      # scripts/wasm-build.sh produces, so the extension job can download and
      # reuse it instead of rebuilding (fat-LTO) twice more.
      - name: Build wasm
        run: |
          wasm-pack build crates/policy-engine-wasm \
            --target web \
            --release \
            --out-dir pkg \
            --out-name policy_engine_wasm

      - name: Upload wasm pkg (reused by the extension build)
        uses: actions/upload-artifact@v4
        with:
          name: policy-engine-wasm-pkg-${{ github.sha }}
          path: crates/policy-engine-wasm/pkg
          if-no-files-found: error
          retention-days: 1

      - name: wasm-bindgen-tests (headless Chrome)
        run: wasm-pack test --headless --chrome crates/policy-engine-wasm

  extension:
    runs-on: ubuntu-latest
    needs: [rust, wasm]
    # The wasm pkg is downloaded from the `wasm` job (built once); reuse it for
    # both build:chrome and build:firefox (and `yarn typecheck`) instead of
    # rebuilding via wasm-pack each time. scripts/wasm-build.sh skips its own
    # wasm-pack build when SKIP_WASM_BUILD=1 and a prebuilt pkg/ is present.
    env:
      SKIP_WASM_BUILD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack + Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate

      - working-directory: browser-extension
        run: yarn install --immutable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ws"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Download prebuilt wasm pkg
        uses: actions/download-artifact@v4
        with:
          name: policy-engine-wasm-pkg-${{ github.sha }}
          path: crates/policy-engine-wasm/pkg

      - working-directory: browser-extension
        run: yarn typecheck

      - working-directory: browser-extension
        name: Run vitest
        run: yarn test --run

      - working-directory: browser-extension
        run: yarn build:chrome
        env:
          PASU_ALLOW_INSECURE_REGISTRY: '1'

      - working-directory: browser-extension
        run: yarn build:firefox
        env:
          PASU_ALLOW_INSECURE_REGISTRY: '1'

      - working-directory: browser-extension/dashboard
        name: Dashboard build (tsc --noEmit + vite build)
        run: yarn build

      - name: Upload dashboard dist (PR build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pasu-dashboard-${{ github.sha }}
          path: |
            browser-extension/dist/chrome/options.html
            browser-extension/dist/chrome/assets
          if-no-files-found: error
          retention-days: 14

      - working-directory: browser-extension
        name: Package extension zips
        run: yarn zip

      - name: Upload Chrome dist (PR build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pasu-chrome-${{ github.sha }}
          path: browser-extension/dist/chrome.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Firefox dist (PR build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pasu-firefox-${{ github.sha }}
          path: browser-extension/dist/firefox.zip
          if-no-files-found: error
          retention-days: 14

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ws"

      # Prebuilt binaries instead of `cargo install` from source (much faster,
      # same checks).
      - name: Install dependency tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Dependency audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0048

      - name: Dependency policy
        run: cargo deny check
