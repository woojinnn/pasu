[package]
name = "simulation-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HTTP backend service for the simulation engine. DB-only contract: wallet state cache, policy/verdict storage, catalog reads, auth. Cedar evaluation + selector decode + revoke calldata building live in the browser (apps/web/src/cedar + tools/, backed by crates/cedar-wasm-lite). Extensions push verdicts via `POST /verdicts`."
publish = false

[dependencies]
# The service operates on the pure simulation types + reducer. NO cedar /
# policy-engine dependency: the extension owns Cedar evaluation.
simulation-state.workspace = true
simulation-reducer.workspace = true
# Sync orchestrator hooks live RPC/oracle fetchers into `LiveField` refresh.
simulation-sync.workspace = true
# SQLite-backed wallet/policy/execution-report persistence. The handler
# stays db-agnostic where possible (operates on `&dyn WalletStore`); this
# dep is required directly for `MultiUserStore` and `SqliteExecutionReportStore`.
simulation-db.workspace = true
serde.workspace = true
serde_json.workspace = true

# HTTP server stack — versions mirror `adapter-debug-dashboard`.
axum = "0.7"
tower-http = { version = "0.5", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { workspace = true }
async-trait.workspace = true
thiserror.workspace = true

# SSE: bridge tokio::broadcast → axum Sse via tokio_stream + futures helpers.
tokio-stream = { version = "0.1", features = ["sync"] }
futures = "0.3"

# Auth: JWT signing/verification (HS256). Stateless tokens, no Redis.
jsonwebtoken = "9"
# OAuth callback fetches Google's token endpoint and userinfo.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
# URL-encoding query params for the Google authorize redirect.
urlencoding = "2"
# Decoding the base64-url payload of Google's id_token.
base64 = "0.22"
# Time math for token expiry.
time = { version = "0.3", default-features = false, features = ["std"] }
# Loads `.env` at startup so OAuth/JWT config doesn't need to be exported
# manually in every dev shell.
dotenvy = "0.15"

[dev-dependencies]
tempfile = "3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
