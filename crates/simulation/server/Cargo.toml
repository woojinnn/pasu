[package]
name = "simulation-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HTTP backend service for the simulation engine — executes enrichment calls + simulates Action(s) over wallet state and returns state / statediff / results. Cedar evaluation stays in the browser extension, so this crate has NO cedar/policy-engine dependency."
publish = false

[dependencies]
# The service operates on the pure simulation types + reducer. NO cedar /
# policy-engine dependency: the extension owns Cedar evaluation.
simulation-state.workspace = true
simulation-reducer.workspace = true
simulation-db = { path = "../db", version = "0.1.0" }
# Wallet-state persistence stays behind `simulation_sync::WalletStore`; the
# server uses `simulation-db` directly only for execution-report persistence.
simulation-sync.workspace = true
serde.workspace = true
serde_json.workspace = true

# HTTP server stack — versions mirror `adapter-debug-dashboard`.
axum = "0.7"
tower-http = { version = "0.5", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { workspace = true }
async-trait.workspace = true
