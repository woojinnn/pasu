# Throwaway in-cluster Redis for local Kubernetes testing only.
# The Service name `redis` is used by the local REDIS_URL:
# redis://redis:6379/0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: policy-server-local-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: policy-server-local-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy-server-local-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: policy-server-local-redis
spec:
  selector:
    app.kubernetes.io/name: policy-server-local-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
