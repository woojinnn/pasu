# Helm overlay for M3 (fixed HTTPS domain via GCE Ingress + ManagedCertificate + OAuth).
# Deploy:
#   helm upgrade --install pasu <chart> -n pasu \
#     -f <chart>/values-m3.yaml --set image.tag=<git short sha>

image:
  repository: asia-northeast3-docker.pkg.dev/policy-engine-498313/pasu/pasu-policy-server
  pullPolicy: IfNotPresent

api:
  replicas: 2
  publicApiUrl: https://pasu-policy.duckdns.org
  dashboardUrl: https://pasu-policy.duckdns.org
  # Local-unpacked browser extension (stable id via manifest key) logging in
  # through chrome.identity.launchWebAuthFlow. Must EQUAL getRedirectURL()
  # byte-for-byte (trailing slash included).
  oauthAllowedRedirectUris: "https://fbadoakiikjmgdpdhpcohaddifhaggki.chromiumapp.org/"
  corsAllowedOrigins:
    - https://pasu-policy.duckdns.org
    - chrome-extension://fbadoakiikjmgdpdhpcohaddifhaggki

# GCE Ingress backend → ClusterIP (no external LB on the Service itself).
service:
  type: ClusterIP

ingress:
  enabled: true
  # GCE controller is selected via the kubernetes.io/ingress.class annotation
  # (this cluster has no "gce" IngressClass, so ingressClassName would match nothing).
  className: ""
  host: pasu-policy.duckdns.org
  tls:
    enabled: false          # ManagedCertificate provides TLS via annotation, not a secret
  gce:
    enabled: true
    staticIpName: pasu-ingress-ip
    allowHttp: "true"       # keep :80 during cert provisioning; clients use HTTPS once ACTIVE
  annotations: {}

managedCertificate:
  enabled: true

backendConfig:
  enabled: true
  timeoutSec: 3600

syncConfig: |-
  [rpc.failover]
  strategy = "priority"
  retry_attempts = 3
  retry_delay_ms = 200
  mark_unhealthy_after = 5
  unhealthy_cooldown_sec = 60

  [rpc.chains."eip155:1"]
  multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

  [[rpc.chains."eip155:1".providers]]
  name = "publicnode"
  kind = "public"
  url = "https://ethereum-rpc.publicnode.com"
  priority = 1
  ws = false

  [rpc.chains."eip155:42161"]
  multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

  [[rpc.chains."eip155:42161".providers]]
  name = "publicnode-arb"
  kind = "public"
  url = "https://arbitrum-one-rpc.publicnode.com"
  priority = 1
  ws = false

  [rpc.chains."eip155:8453"]
  multicall_addr = "0xcA11bde05977b3631167028862bE2a173976CA11"

  [[rpc.chains."eip155:8453".providers]]
  name = "publicnode-base"
  kind = "public"
  url = "https://base-rpc.publicnode.com"
  priority = 1
  ws = false

  [oracles.rest.coingecko]
  base_url = "https://api.coingecko.com/api/v3"
  timeout_sec = 10

  [oracles.rest.coingecko.feeds]
  "USDC/USD" = { path = "/simple/price?ids=usd-coin&vs_currencies=usd", json_pointer = "/usd-coin/usd" }
  "USDT/USD" = { path = "/simple/price?ids=tether&vs_currencies=usd", json_pointer = "/tether/usd" }
  "ETH/USD" = { path = "/simple/price?ids=ethereum&vs_currencies=usd", json_pointer = "/ethereum/usd" }
  "WETH/USD" = { path = "/simple/price?ids=weth&vs_currencies=usd", json_pointer = "/weth/usd" }
  "BTC/USD" = { path = "/simple/price?ids=bitcoin&vs_currencies=usd", json_pointer = "/bitcoin/usd" }
  "WBTC/USD" = { path = "/simple/price?ids=wrapped-bitcoin&vs_currencies=usd", json_pointer = "/wrapped-bitcoin/usd" }
  "DAI/USD" = { path = "/simple/price?ids=dai&vs_currencies=usd", json_pointer = "/dai/usd" }
  "MATIC/USD" = { path = "/simple/price?ids=matic-network&vs_currencies=usd", json_pointer = "/matic-network/usd" }
  "ARB/USD" = { path = "/simple/price?ids=arbitrum&vs_currencies=usd", json_pointer = "/arbitrum/usd" }

  [venues.hyperliquid]
  endpoint = "https://api.hyperliquid.xyz"

  [venues.uniswap]
  orders_endpoint = "https://api.uniswap.org/v2"
  api_key = "${UNISWAP_KEY}"
  chains = ["eip155:1"]

  # 1inch venues — all share the one Dev Portal Bearer key (ONEINCH_KEY, wired as
  # an optional secretKeyRef on the worker). REQUIRES the ONEINCH_KEY secret value
  # to be present: a keyless ${ONEINCH_KEY} expands to "" and 401s every tick.
  [venues.one_inch_fusion]
  base_url = "https://api.1inch.dev/fusion"
  api_key = "${ONEINCH_KEY}"
  chains = ["eip155:1", "eip155:42161", "eip155:8453"]

  # Fusion+ is cross-chain: queried globally by maker (no chains list).
  [venues.one_inch_fusion_plus]
  base_url = "https://api.1inch.dev/fusion-plus"
  api_key = "${ONEINCH_KEY}"

  [venues.one_inch_lop]
  base_url = "https://api.1inch.dev/orderbook"
  api_key = "${ONEINCH_KEY}"
  chains = ["eip155:1", "eip155:42161", "eip155:8453"]
