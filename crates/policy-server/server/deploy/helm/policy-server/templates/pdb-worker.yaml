{{- if .Values.pdb.worker.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "policy-server.fullname" . }}-worker
  labels:
    {{- include "policy-server.labels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.worker.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "policy-server.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
{{- end }}
