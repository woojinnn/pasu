apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "policy-server.fullname" . }}-api
  labels:
    {{- include "policy-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "policy-server.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "policy-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/sync-config: {{ .Values.syncConfig | sha256sum | quote }}
    spec:
      serviceAccountName: {{ include "policy-server.serviceAccountName" . }}
      containers:
        - name: api
          image: {{ include "policy-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["policy-server"]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: POLICY_SERVER_ADDR
              value: "0.0.0.0:{{ .Values.api.port }}"
            - name: PUBLIC_API_URL
              value: {{ .Values.api.publicApiUrl | quote }}
            - name: DASHBOARD_URL
              value: {{ .Values.api.dashboardUrl | quote }}
            - name: OAUTH_ALLOWED_REDIRECT_URIS
              value: {{ .Values.api.oauthAllowedRedirectUris | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ join "," .Values.api.corsAllowedOrigins | quote }}
            - name: CORS_ALLOW_PRIVATE_NETWORK
              value: {{ .Values.api.corsAllowPrivateNetwork | quote }}
            - name: MARKET_ADMIN_EMAILS
              value: {{ .Values.api.marketAdminEmails | quote }}
            - name: PASU_SYNC_CONFIG
              value: /app/pasu-sync.toml
            - name: REQUIRE_SYNC_CONFIG
              value: {{ .Values.runtime.requireSyncConfig | quote }}
            - name: RUN_MIGRATIONS_ON_STARTUP
              value: {{ .Values.runtime.runMigrationsOnStartup | quote }}
            - name: REDIS_EVENTS_CHANNEL
              value: {{ .Values.runtime.redisEventsChannel | quote }}
            - name: SYNC_WORKER_TICK_SECS
              value: {{ .Values.worker.tickSeconds | quote }}
            - name: SYNC_LOCK_TTL_SECS
              value: {{ .Values.worker.lockTtlSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.runtime.rustLog | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: REDIS_URL
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: GOOGLE_REDIRECT_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: JWT_SECRET
            - name: ETHERSCAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: ETHERSCAN_API_KEY
                  optional: true
            - name: COINGECKO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: COINGECKO_API_KEY
                  optional: true
          volumeMounts:
            - name: sync-config
              mountPath: /app/pasu-sync.toml
              subPath: pasu-sync.toml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          # Zero-downtime on GKE L7: keep serving for a few seconds after SIGTERM
          # so the GCLB drops this pod from the NEG before it stops accepting
          # connections (avoids 502s during rollouts). Graceful drain runs after.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "{{ .Values.api.preStopSleepSeconds }}"]
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      volumes:
        - name: sync-config
          configMap:
            name: {{ include "policy-server.fullname" . }}-sync
