apiVersion: v1
kind: Service
metadata:
  name: {{ include "policy-server.fullname" . }}-api
  labels:
    {{- include "policy-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- if .Values.backendConfig.enabled }}
  annotations:
    cloud.google.com/backend-config: '{"ports": {"http": "{{ printf "%s-backendconfig" (include "policy-server.fullname" .) }}"}}'
    cloud.google.com/neg: '{"ingress": true}'
  {{- end }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "policy-server.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
