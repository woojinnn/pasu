# Helm value overrides for GKE.
# Layered on the chart default values.yaml.
# Deploy:
#   helm upgrade --install dambi <chart> -n dambi \
#     -f <chart>/values-gke.yaml --set image.tag=$(git rev-parse --short HEAD)

image:
  repository: asia-northeast3-docker.pkg.dev/policy-engine-498313/dambi/dambi-policy-server
  # tag is supplied at deploy time via --set image.tag=<git short sha>
  pullPolicy: IfNotPresent

api:
  replicas: 2
  publicApiUrl: https://dambi-policy.duckdns.org
  dashboardUrl: https://dambi-policy.duckdns.org
  corsAllowedOrigins:
    - https://dambi-policy.duckdns.org
    - chrome-extension://fbadoakiikjmgdpdhpcohaddifhaggki

# M2: expose the API via an external L4 LoadBalancer (temp HTTP). No ingress/TLS yet.
service:
  type: LoadBalancer

ingress:
  enabled: false

# Fixed 2 replicas guarantees the cross-replica SSE proof; HPA deferred to M3.
hpa:
  enabled: false

worker:
  replicas: 1

# existingSecret stays the chart default (policy-server-secrets); the secret-name
# rename was explicitly skipped (spec §9). The secret is created via kubectl (Task 12).
