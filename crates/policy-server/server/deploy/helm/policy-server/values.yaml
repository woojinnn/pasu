image:
  repository: ghcr.io/woojinnn/pasu-policy-server
  tag: ""
  pullPolicy: IfNotPresent

existingSecret: policy-server-secrets

service:
  type: ClusterIP

api:
  replicas: 1
  port: 8788
  # preStop sleep + grace period → zero-downtime rollouts on GKE L7 (NEG drain race)
  preStopSleepSeconds: 15
  terminationGracePeriodSeconds: 30
  publicApiUrl: https://pasu-policy.duckdns.org
  dashboardUrl: https://pasu-policy.duckdns.org
  # Exact-match allowlist (comma-separated) of non-default OAuth redirect
  # targets — e.g. a browser extension's https://<id>.chromiumapp.org/.
  # Empty = only the default DASHBOARD_URL flow is allowed (fail-closed).
  oauthAllowedRedirectUris: ""
  corsAllowPrivateNetwork: false
  corsAllowedOrigins:
    - https://pasu-policy.duckdns.org
    - chrome-extension://<published-extension-id>
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  replicas: 1
  tickSeconds: 30
  lockTtlSeconds: 120
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

runtime:
  rustLog: info,policy_server=debug,policy_sync=info
  requireSyncConfig: true
  runMigrationsOnStartup: false
  redisEventsChannel: policy-server:events

ingress:
  enabled: true
  className: nginx
  host: pasu-policy.duckdns.org
  tls:
    enabled: true
    secretName: policy-server-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  gce:
    enabled: false
    staticIpName: ""
    allowHttp: "true"

serviceAccount:
  create: true
  name: ""

migrationJob:
  enabled: true

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  api:
    enabled: true
    minAvailable: 1
  worker:
    enabled: true
    maxUnavailable: 1

networkPolicy:
  enabled: false

syncConfig: |-
  # Override this value with the production pasu-sync.toml.
  [rpc.failover]
  strategy = "priority"
  retry_attempts = 3
  retry_delay_ms = 200
  mark_unhealthy_after = 5
  unhealthy_cooldown_sec = 60

  [venues.hyperliquid]
  endpoint = "https://api.hyperliquid.xyz"

  [venues.uniswap]
  # UniswapX order-status via the public v2 service (swapper-based listing, no
  # api-key required). Without this section the sync worker logs "uniswap_x
  # fetcher is not configured" every tick and off-chain intent state is untracked.
  orders_endpoint = "https://api.uniswap.org/v2"
  api_key = "${UNISWAP_KEY}"
  chains = ["eip155:1"]

  [venues.cowswap]
  # CoW Protocol Orderbook order-status — fully public (no api-key), safe in
  # prod. The {network} host segment is derived per chain.
  base_url = "https://api.cow.fi"
  chains = ["eip155:1"]

  # TODO(1inch prod): add [venues.one_inch_fusion] once ONEINCH_KEY is wired as a
  # k8s secret. The fetcher code is fully there, but a keyless config would 401
  # every tick — enable only after the Bearer key is available in the env.

managedCertificate:
  enabled: false

backendConfig:
  enabled: false
  timeoutSec: 3600
