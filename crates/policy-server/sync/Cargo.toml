[package]
name = "policy-sync"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
policy-state = { workspace = true }
# Action types used to walk and update `Action.live_inputs`.
policy-transition = { workspace = true }

# External data fetch.
tokio = { workspace = true }
reqwest = { workspace = true }
async-trait = { workspace = true }

# Config
toml = { workspace = true }

# Serde
serde = { workspace = true }
serde_json = { workspace = true }
rust_decimal = { workspace = true }

# Errors
thiserror = { workspace = true }

# Observability — surface non-fatal fetch failures (oracle/venue) that were
# otherwise swallowed silently.
tracing = "0.1"

# EVM types for eth_call ABI encoding.
alloy-primitives = { workspace = true }
# Dynamic ABI decoding — generic decoder + Sourcify integration
alloy-dyn-abi = { workspace = true }
alloy-sol-types = { workspace = true }
hex = { workspace = true }
